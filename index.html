<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lector de Códigos</title>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e8eaf0; padding: 16px; max-width: 700px; margin: 0 auto; }
h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
.sub { font-size: 13px; color: #8b8fa8; text-align: center; margin-bottom: 16px; }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat { background: #1e2235; border-radius: 10px; padding: 12px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: #5a5f7a; margin-top: 2px; }
.card { background: #161924; border: 1px solid #252840; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 600; color: #5a5f7a; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

/* Quagga renders its own video+canvas inside this div */
#scanner-container {
  position: relative;
  width: 100%;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 4/3;
}
#scanner-container video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  display: block;
}
#scanner-container canvas {
  position: absolute !important;
  top: 0 !important; left: 0 !important;
  width: 100% !important;
  height: 100% !important;
}
.scan-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
.scan-box {
  width: 85%; height: 35%;
  border: 2px solid rgba(59,76,202,0.9);
  border-radius: 8px; position: relative;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
}
.scan-line {
  position: absolute; left: 4px; right: 4px; height: 2px;
  background: linear-gradient(90deg, transparent, #3b4cca, #60a5fa, #3b4cca, transparent);
  animation: scan 1.5s ease-in-out infinite; top: 10%;
}
@keyframes scan { 0%,100%{top:10%} 50%{top:85%} }
.corner { position: absolute; width: 14px; height: 14px; border-color: #60a5fa; border-style: solid; }
.corner.tl { top:-2px; left:-2px; border-width: 3px 0 0 3px; }
.corner.tr { top:-2px; right:-2px; border-width: 3px 3px 0 0; }
.corner.bl { bottom:-2px; left:-2px; border-width: 0 0 3px 3px; }
.corner.br { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; }
.hint-txt { position: absolute; bottom: 8px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.45); pointer-events: none; z-index: 11; }

.status { background: #1a1e30; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #5a5f7a; text-align: center; margin-top: 10px; min-height: 34px; display: flex; align-items: center; justify-content: center; }
.status.ok { color: #4ade80; background: #0f2d1a; }
.status.err { color: #f87171; background: #2d1a1a; }
.status.loading { color: #60a5fa; background: #0f1a2d; }

.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid #2a2f47; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-start { background: #3b4cca; border-color: #4a5ce0; color: #fff; }
.btn-start:not(:disabled):hover { background: #4a5ce0; }
.btn-stop { background: #2d1a1a; border-color: #5a2020; color: #f87171; }

.manual-row { display: flex; gap: 8px; margin-top: 12px; }
.manual-row input { flex: 1; background: #1e2235; border: 1px solid #2a2f47; border-radius: 8px; padding: 10px 12px; color: #e8eaf0; font-size: 14px; outline: none; }
.manual-row input::placeholder { color: #4a4f6a; }
.manual-row input:focus { border-color: #3b4cca; }
.btn-add { flex: 0; padding: 10px 16px; background: #1e2235; color: #c8cce8; font-size: 14px; }

.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #2a2f47; background: transparent; color: #8b8fa8; font-size: 12px; cursor: pointer; }
.filter-btn.active { background: #3b4cca; border-color: #3b4cca; color: #fff; }
.actions { display: flex; gap: 6px; }
.btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 7px; border: 1px solid; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500; }
.btn-clear { background: #2d1a1a; border-color: #5a2020; color: #f87171; }
.btn-export { background: #0f2d1a; border-color: #1a5a30; color: #4ade80; }
.btn-export:hover { background: #1a3d25; }

.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #252840; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #1a1e30; }
th { padding: 9px 12px; text-align: left; color: #5a5f7a; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid #252840; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #1a1e30; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #1a1e30; }
td { padding: 9px 12px; color: #c8cce8; }
.code-td { font-family: monospace; font-size: 12px; color: #7dd3fc; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.b-qr { background: #1a2d4a; color: #60a5fa; }
.b-bar { background: #1a2d1a; color: #4ade80; }
.b-man { background: #2d2a1a; color: #fbbf24; }
.note-inp { width: 100%; background: #0f1117; border: 1px solid #2a2f47; border-radius: 5px; padding: 3px 7px; color: #e8eaf0; font-size: 12px; outline: none; }
.del-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; color: #3a3f5a; font-size: 14px; }
.del-btn:hover { color: #f87171; }
.empty { text-align: center; padding: 36px 20px; color: #3a3f5a; font-size: 13px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); padding: 10px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transition: all .25s; z-index: 999; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok { background: #0f2d1a; border: 1px solid #1a5a30; color: #4ade80; }
.toast.err { background: #2d1a1a; border: 1px solid #5a2020; color: #f87171; }
</style>
</head>
<body>

<h1>📦 Lector de Códigos</h1>
<p class="sub">EAN-13 · QR · Barcode · Excel</p>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" style="color:#60a5fa" id="s-qr">0</div><div class="stat-lbl">QR</div></div>
  <div class="stat"><div class="stat-val" style="color:#4ade80" id="s-bar">0</div><div class="stat-lbl">Barcode</div></div>
</div>

<div class="card">
  <div class="card-title">Escáner</div>
  <div id="scanner-container">
    <div class="scan-overlay">
      <div class="scan-box">
        <div class="scan-line"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
    <div class="hint-txt">Centra el código de barras en el recuadro</div>
  </div>
  <div class="status" id="status">Pulsa Iniciar para activar la cámara</div>
  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startScan()">▶ Iniciar</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopScan()" disabled>■ Detener</button>
  </div>
  <div class="manual-row">
    <input id="manual-inp" type="text" placeholder="Código manual..." onkeydown="if(event.key==='Enter')addManual()">
    <button class="btn btn-add" onclick="addManual()">+ Añadir</button>
  </div>
</div>

<div class="card">
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('QR',this)">QR</button>
      <button class="filter-btn" onclick="setFilter('Barcode',this)">Barcode</button>
      <button class="filter-btn" onclick="setFilter('Manual',this)">Manual</button>
    </div>
    <div class="actions">
      <button class="btn-sm btn-clear" onclick="clearAll()">✕ Limpiar</button>
      <button class="btn-sm btn-export" onclick="exportXLS()">↓ Excel</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Código</th><th>Tipo</th><th>Fecha/Hora</th><th>Nota</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty">Sin registros — escanea o introduce un código</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let records = JSON.parse(localStorage.getItem('scan_q2') || '[]');
let filterType = 'all';
let lastCode = '', lastTime = 0;
let quaggaRunning = false;

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

function startScan() {
  document.getElementById('btn-start').disabled = true;
  setStatus('Iniciando escáner...', 'loading');

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('scanner-container'),
      constraints: {
        facingMode: 'environment',
        width: { min: 640, ideal: 1280, max: 1920 },
        height: { min: 480, ideal: 720, max: 1080 },
      },
      area: {
        top: '20%', right: '5%',
        left: '5%', bottom: '20%',
      },
    },
    locator: {
      patchSize: 'medium',
      halfSample: false,
    },
    numOfWorkers: 0, // required for iOS
    frequency: 10,
    decoder: {
      readers: [
        'ean_reader',
        'ean_8_reader',
        'code_128_reader',
        'code_39_reader',
        'upc_reader',
        'upc_e_reader',
        'codabar_reader',
        'i2of5_reader',
      ],
      debug: {
        drawBoundingBox: false,
        showFrequency: false,
        drawScanline: false,
        showPattern: false,
      },
      multiple: false,
    },
    locate: true,
  }, function(err) {
    if (err) {
      setStatus('Error: ' + err.message, 'err');
      toast('Error iniciando escáner: ' + err.message, 'err');
      document.getElementById('btn-start').disabled = false;
      return;
    }
    Quagga.start();
    quaggaRunning = true;
    document.getElementById('btn-stop').disabled = false;
    setStatus('✓ Apunta el código de barras al recuadro', 'ok');
  });

  // Result handler — only accept high confidence results
  Quagga.onDetected(function(result) {
    if (!result || !result.codeResult) return;

    const code = result.codeResult.code;
    const format = result.codeResult.format;

    // Filter low confidence reads
    const errors = result.codeResult.decodedCodes
      .filter(c => c.error !== undefined)
      .map(c => c.error);
    const avgError = errors.length ? errors.reduce((a,b) => a+b, 0) / errors.length : 1;

    if (avgError > 0.25) return; // too many errors, skip

    const isQR = format === 'qr_code';
    addRecord(code, isQR ? 'QR' : 'Barcode (' + format + ')');
  });
}

function stopScan() {
  if (quaggaRunning) {
    Quagga.stop();
    quaggaRunning = false;
  }
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  setStatus('Escáner detenido', '');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function addRecord(code, type) {
  const now = Date.now();
  if (code === lastCode && now - lastTime < 2500) return;
  lastCode = code; lastTime = now;

  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 1400;
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    o.start(); o.stop(ac.currentTime + 0.1);
  } catch(e) {}

  const rec = {
    id: records.length ? Math.max(...records.map(r => r.id)) + 1 : 1,
    code, type,
    date: new Date().toLocaleString('es-ES'),
    note: ''
  };
  records.unshift(rec);
  save(); updateStats(); renderTable();
  toast('✓ ' + code, 'ok');
}

function addManual() {
  const inp = document.getElementById('manual-inp');
  const v = inp.value.trim();
  if (!v) { toast('Introduce un código', 'err'); return; }
  addRecord(v, 'Manual');
  inp.value = '';
}

function deleteRec(id) { records = records.filter(r => r.id !== id); save(); updateStats(); renderTable(); }
function updateNote(id, val) { const r = records.find(r => r.id === id); if (r) { r.note = val; save(); } }
function clearAll() { if (!records.length) return; if (!confirm('¿Eliminar todos?')) return; records = []; save(); updateStats(); renderTable(); }
function save() { localStorage.setItem('scan_q2', JSON.stringify(records)); }

function updateStats() {
  document.getElementById('s-total').textContent = records.length;
  document.getElementById('s-qr').textContent = records.filter(r => r.type.startsWith('QR')).length;
  document.getElementById('s-bar').textContent = records.filter(r => r.type.startsWith('Barcode')).length;
}

function setFilter(type, btn) {
  filterType = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  let data = filterType === 'all' ? records : records.filter(r => r.type.startsWith(filterType));
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = data.map(r => {
    const bc = r.type.startsWith('QR') ? 'b-qr' : r.type === 'Manual' ? 'b-man' : 'b-bar';
    return `<tr>
      <td style="color:#3a3f5a;font-size:11px">${r.id}</td>
      <td class="code-td" title="${r.code}">${r.code}</td>
      <td><span class="badge ${bc}">${r.type}</span></td>
      <td style="font-size:11px;color:#5a5f7a;white-space:nowrap">${r.date}</td>
      <td><input class="note-inp" value="${(r.note||'').replace(/"/g,'&quot;')}" placeholder="Nota..." onchange="updateNote(${r.id},this.value)"></td>
      <td><button class="del-btn" onclick="deleteRec(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function exportXLS() {
  if (!records.length) { toast('Sin registros', 'err'); return; }
  const data = records.map(r => ({ 'ID': r.id, 'Código': r.code, 'Tipo': r.type, 'Fecha/Hora': r.date, 'Nota': r.note || '' }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{ wch: 5 }, { wch: 42 }, { wch: 14 }, { wch: 20 }, { wch: 30 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Códigos');
  XLSX.writeFile(wb, 'codigos_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  toast('Excel exportado ✓', 'ok');
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

updateStats();
renderTable();
</script>
</body>
</html>
